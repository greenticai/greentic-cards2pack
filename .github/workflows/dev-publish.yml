# Managed alongside sync-dev-publish.sh, but hand-edited to add a
# repo-specific setup-script (this repo's tests shell out to greentic-flow).
# If sync-dev-publish.sh is re-run it will clobber the setup-script line;
# restore it from git history until the sync script learns setup-script.
# Source: REPO_MANIFEST.toml in greenticai/.github
name: Dev Publish

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dev-publish:
    uses: greenticai/.github/.github/workflows/dev-publish.yml@main
    with:
      crates: "greentic-cards2pack"
      # Integration tests shell out to the `greentic-flow` binary, so it must
      # be installed on the runner before `cargo test` runs. Mirrors ci.yml.
      setup-script: "if ! command -v cargo-binstall >/dev/null 2>&1; then cargo install cargo-binstall --locked; fi && cargo binstall -y greentic-flow --force"
    secrets: inherit
